name: Build & Release Module

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK with Gradle
        run: |
          chmod +x gradlew
          gradle :app:assembleDebug

      - name: Prepare Module Files
        run: |
          mkdir -p output/module
          mkdir -p module/system/priv-app/SmsForwarder
          cp app/build/outputs/apk/debug/app-debug.apk module/system/priv-app/SmsForwarder/SmsForwarder.apk
          cp -r module/* output/module/
          cd output/module
          zip -r ../../SmsForwarderModule.zip ./*

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmsForwarderModule
          path: SmsForwarderModule.zip

      - name: Create Release
        if: github.event_name == 'push' && contains(github.ref, 'main')
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.0-${{ github.run_number }}
          name: Release v1.0.0 (Build ${{ github.run_number }})
          files: |
            SmsForwarderModule.zip
            app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
